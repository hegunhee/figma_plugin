<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
      font-size: 11px;
      background: var(--figma-color-bg);
      color: var(--figma-color-text);
      padding: 10px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      gap: 7px;
      overflow: hidden;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }
    .header h1 {
      font-size: 12px;
      font-weight: 600;
      flex: 1;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot.connected    { background: #00cc66; box-shadow: 0 0 4px #00cc66; }
    .dot.disconnected { background: #ff4444; }
    .dot.reconnecting { background: #ffaa00; box-shadow: 0 0 4px #ffaa00; }

    /* ── Status row ── */
    .status-row {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 8px;
      background: var(--figma-color-bg-secondary);
      border-radius: 5px;
      flex-shrink: 0;
    }
    #status-text {
      font-size: 10px;
      color: var(--figma-color-text-secondary);
      flex: 1;
    }
    #last-response {
      font-size: 9px;
      color: var(--figma-color-text-tertiary);
    }

    /* ── File row ── */
    .file-row {
      font-size: 10px;
      color: var(--figma-color-text-secondary);
      flex-shrink: 0;
      padding: 0 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .file-row span { color: var(--figma-color-text); font-weight: 500; }

    /* ── Tools grid ── */
    .tools {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4px;
      flex-shrink: 0;
    }
    button {
      font-size: 10px;
      padding: 5px 8px;
      border-radius: 4px;
      border: 1px solid var(--figma-color-border);
      background: var(--figma-color-bg-secondary);
      color: var(--figma-color-text);
      cursor: pointer;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    button:hover  { background: var(--figma-color-bg-hover); }
    button:active { opacity: 0.7; }

    /* ── Log section ── */
    .log-section {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-height: 0;
      gap: 4px;
    }
    .log-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }
    .log-header > span {
      font-size: 10px;
      color: var(--figma-color-text-tertiary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .log-header button {
      font-size: 9px;
      padding: 2px 7px;
    }

    #log {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      background: var(--figma-color-bg-secondary);
      border-radius: 5px;
      padding: 5px;
      display: flex;
      flex-direction: column;
      gap: 1px;
    }
    .log-line {
      font-family: 'Menlo', 'Monaco', 'Courier New', monospace;
      font-size: 9px;
      padding: 1px 3px;
      border-radius: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex-shrink: 0;
    }
    .log-line.in   { color: #4caf50; }
    .log-line.out  { color: #2196f3; }
    .log-line.info { color: var(--figma-color-text-tertiary); }

    /* ── Footer ── */
    .port-hint {
      font-size: 9px;
      color: var(--figma-color-text-tertiary);
      text-align: center;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div class="header">
    <div id="status-dot" class="dot disconnected"></div>
    <h1>MCP Bridge</h1>
    <span id="file-name" style="font-size:10px; color:var(--figma-color-text-secondary); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:100px;">—</span>
  </div>

  <div class="status-row">
    <div id="status-text">연결 중...</div>
    <span id="last-response"></span>
  </div>

  <div class="tools">
    <button onclick="testSelection()">선택 노드</button>
    <button onclick="testFileInfo()">파일 정보</button>
    <button onclick="testComments()">댓글</button>
    <button onclick="testPageNodes()">페이지 노드</button>
    <button onclick="testStyles()">스타일</button>
    <button onclick="manualReconnect()">재연결</button>
  </div>

  <div class="log-section">
    <div class="log-header">
      <span>Activity Log</span>
      <button onclick="clearLog()">지우기</button>
    </div>
    <div id="log"></div>
  </div>

  <div class="port-hint">ws://localhost:3055</div>

</body>
</html>
