<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
      font-size: 11px;
      background: var(--figma-color-bg);
      color: var(--figma-color-text);
      padding: 12px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .header h1 {
      font-size: 13px;
      font-weight: 600;
      color: var(--figma-color-text);
      flex: 1;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot.connected { background: #00cc66; box-shadow: 0 0 4px #00cc66; }
    .dot.disconnected { background: #ff4444; }

    .status-row {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 8px;
      background: var(--figma-color-bg-secondary);
      border-radius: 6px;
    }
    #status-text { font-size: 11px; color: var(--figma-color-text-secondary); }

    .file-row {
      font-size: 11px;
      color: var(--figma-color-text-secondary);
      padding: 0 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .file-row span { color: var(--figma-color-text); font-weight: 500; }

    .tools {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
    }
    button {
      font-size: 10px;
      padding: 4px 10px;
      border-radius: 4px;
      border: 1px solid var(--figma-color-border);
      background: var(--figma-color-bg-secondary);
      color: var(--figma-color-text);
      cursor: pointer;
      white-space: nowrap;
    }
    button:hover { background: var(--figma-color-bg-hover); }
    button:active { opacity: 0.7; }

    .log-header {
      font-size: 10px;
      color: var(--figma-color-text-tertiary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    #log {
      flex: 1;
      overflow-y: auto;
      background: var(--figma-color-bg-secondary);
      border-radius: 6px;
      padding: 6px;
      display: flex;
      flex-direction: column;
      gap: 1px;
    }
    .log-line {
      font-family: 'Menlo', 'Monaco', 'Courier New', monospace;
      font-size: 10px;
      padding: 2px 4px;
      border-radius: 2px;
      color: var(--figma-color-text-secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .log-line.in  { color: #4caf50; }
    .log-line.out { color: #2196f3; }
    .log-line.info { color: var(--figma-color-text-tertiary); }

    .port-hint {
      font-size: 10px;
      color: var(--figma-color-text-tertiary);
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>MCP Bridge</h1>
    <div id="status-dot" class="dot disconnected"></div>
  </div>

  <div class="status-row">
    <div id="status-text">연결 중...</div>
  </div>

  <div class="file-row">파일: <span id="file-name">—</span></div>

  <div class="tools">
    <button onclick="testSelection()">선택 노드</button>
    <button onclick="testComments()">댓글 가져오기</button>
    <button onclick="testStyles()">스타일</button>
  </div>

  <div class="log-header">Activity Log</div>
  <div id="log"></div>

  <div class="port-hint">ws://localhost:3055</div>

  <script src="ui.js"></script>
</body>
</html>
